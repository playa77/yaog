<!-- chat_template.html for YaOG (yaog.py) -->
<!-- Version: 2.5 -->
<!-- Description: The frontend view for the chat interface. -->
<!-- Change Log (v2.5): -->
<!-- - [Settings] Added setFontSize() JS function for dynamic font scaling. -->
<!-- Change Log (v2.4): -->
<!-- - [UX] Added "Thinking..." indicator logic and styling (pulsing animation). -->

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chat View</title>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <style>
        body {
            background-color: #ffffff; /* White background for High Contrast */
            color: #000000;            /* Black text */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 16px; /* Default, can be overridden by JS */
            margin: 0;
            padding: 15px;
        }

        #chat-container {
            display: flex;
            flex-direction: column;
            padding-bottom: 20px;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            max-width: 85%;
            line-height: 1.5;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1); /* Subtle shadow for depth */
        }

        .user {
            background-color: #e3f2fd; /* Light Blue */
            border-left: 4px solid #2196F3;
            align-self: flex-end;
            color: #000000;
        }

        .assistant {
            background-color: #f5f5f5; /* Light Grey */
            border-left: 4px solid #9e9e9e;
            align-self: flex-start;
            color: #000000;
        }

        /* Thinking Indicator Styling */
        .thinking {
            background-color: #f0f0f0;
            border-left: 4px solid #ccc;
            align-self: flex-start;
            color: #666;
            font-style: italic;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1.0; }
            100% { opacity: 0.6; }
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 5px;
        }

        .message-header strong {
            color: #333333; /* Dark Grey for headers */
        }

        .copy-btn {
            background-color: #ffffff;
            border: 1px solid #ccc;
            color: #555;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            padding: 2px 8px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background-color: #eee;
            color: #000;
            border-color: #999;
        }

        /* 
           .content-body handles the actual text/html payload.
        */
        .content-body {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        /* Styling for the attachment indicator */
        .attachment-indicator {
            color: #555;
            font-family: sans-serif;
            font-size: 0.9em;
            margin-top: 10px;
            display: block;
            background-color: rgba(0,0,0,0.05);
            padding: 4px;
            border-radius: 4px;
            border: 1px dashed #aaa;
        }

        /* Markdown specific styling */
        .content-body code {
            background-color: #eee;
            color: #d63384; /* Pink/Red for inline code */
            padding: 2px 4px;
            border-radius: 3px;
            font-family: monospace;
        }
        
        .content-body pre {
            background-color: #2d2d2d; /* Dark background for code blocks */
            color: #f8f8f2;            /* Light text for code */
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
        
        .content-body pre code {
            background-color: transparent;
            color: inherit;
            padding: 0;
        }
    </style>
</head>
<body>

    <div id="chat-container"></div>

    <script>
        let backendProxy = null;

        function clearChat() {
            const chatContainer = document.getElementById('chat-container');
            chatContainer.innerHTML = '';
        }

        // --- Settings: Font Size Control ---
        function setFontSize(sizePx) {
            document.body.style.fontSize = sizePx;
        }

        document.addEventListener("DOMContentLoaded", function() {
            new QWebChannel(qt.webChannelTransport, function(channel) {
                backendProxy = channel.objects.backend;
                backendProxy.message_added.connect(appendMessage);
            });
        });

        function appendMessage(index, role, content, modelName) {
            // Ensure thinking indicator is removed if it exists
            removeThinking();

            const chatContainer = document.getElementById('chat-container');

            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', role);

            // Header Row
            const headerDiv = document.createElement('div');
            headerDiv.classList.add('message-header');

            const title = document.createElement('strong');
            title.textContent = (role === 'user') ? "You" : `Assistant (${modelName})`;
            headerDiv.appendChild(title);

            // Copy Button
            const copyBtn = document.createElement('button');
            copyBtn.textContent = "Copy";
            copyBtn.classList.add('copy-btn');
            copyBtn.onclick = function() {
                if (backendProxy) {
                    backendProxy.copy_message(index);
                }
            };
            headerDiv.appendChild(copyBtn);

            messageDiv.appendChild(headerDiv);

            // Content Body
            const contentDiv = document.createElement('div');
            contentDiv.classList.add('content-body');
            
            contentDiv.innerHTML = content; 
            
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            window.scrollTo(0, document.body.scrollHeight);
        }

        // --- Thinking Indicator Logic ---

        function showThinking() {
            removeThinking(); // Prevent duplicates
            const chatContainer = document.getElementById('chat-container');
            
            const thinkingDiv = document.createElement('div');
            thinkingDiv.id = 'thinking-indicator';
            thinkingDiv.classList.add('message', 'thinking');
            thinkingDiv.textContent = "Thinking...";
            
            chatContainer.appendChild(thinkingDiv);
            window.scrollTo(0, document.body.scrollHeight);
        }

        function updateThinking(text) {
            const thinkingDiv = document.getElementById('thinking-indicator');
            if (thinkingDiv) {
                thinkingDiv.textContent = text;
            }
        }

        function removeThinking() {
            const thinkingDiv = document.getElementById('thinking-indicator');
            if (thinkingDiv) {
                thinkingDiv.remove();
            }
        }
    </script>

</body>
</html>

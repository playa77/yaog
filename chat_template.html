<!-- chat_template.html for YaOG (yaog.py) -->
<!-- Version: 3.4.0 (Phase 1: Smooth Streaming) -->
<!-- Description: Frontend view supporting Real-Time Streaming & Thinking Indicator. -->
<!-- Change Log (v3.4.0): -->
<!-- - [Performance] Added requestAnimationFrame to throttle scrolling (decouples render from layout). -->

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chat View</title>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 16px;
            margin: 0;
            padding: 15px;
        }

        #chat-container {
            display: flex;
            flex-direction: column;
            padding-bottom: 20px;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            max-width: 85%;
            line-height: 1.5;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .user {
            background-color: #e3f2fd; /* Light Blue */
            border-left: 4px solid #2196F3;
            align-self: flex-end;
            color: #000000;
        }

        .assistant {
            background-color: #f5f5f5; /* Light Grey */
            border-left: 4px solid #9e9e9e;
            align-self: flex-start;
            color: #000000;
        }

        /* Thinking Indicator Styling */
        .thinking {
            background-color: #f0f0f0;
            border-left: 4px solid #ccc;
            align-self: flex-start;
            color: #666;
            font-style: italic;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1.0; }
            100% { opacity: 0.6; }
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 5px;
        }

        .message-header strong {
            color: #333333;
        }

        .copy-btn {
            background-color: #ffffff;
            border: 1px solid #ccc;
            color: #555;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            padding: 2px 8px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background-color: #eee;
            color: #000;
            border-color: #999;
        }

        .content-body {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .attachment-indicator {
            color: #555;
            font-family: sans-serif;
            font-size: 0.9em;
            margin-top: 10px;
            display: block;
            background-color: rgba(0,0,0,0.05);
            padding: 4px;
            border-radius: 4px;
            border: 1px dashed #aaa;
        }

        /* Markdown specific styling */
        .content-body code {
            background-color: #eee;
            color: #d63384;
            padding: 2px 4px;
            border-radius: 3px;
            font-family: monospace;
        }
        
        .content-body pre {
            background-color: #2d2d2d;
            color: #f8f8f2;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
        
        .content-body pre code {
            background-color: transparent;
            color: inherit;
            padding: 0;
        }
    </style>
</head>
<body>

    <div id="chat-container"></div>

    <script>
        let backendProxy = null;
        let currentContentDiv = null; // Tracks the div currently receiving stream data
        let isScrolling = false;      // Lock for scroll throttling

        function clearChat() {
            const chatContainer = document.getElementById('chat-container');
            chatContainer.innerHTML = '';
            currentContentDiv = null;
        }

        function setFontSize(sizePx) {
            document.body.style.fontSize = sizePx;
        }

        document.addEventListener("DOMContentLoaded", function() {
            new QWebChannel(qt.webChannelTransport, function(channel) {
                backendProxy = channel.objects.backend;
                // Connect signals
                backendProxy.message_added.connect(appendFullMessage);
                backendProxy.token_received.connect(appendToken);
            });
        });

        // --- Legacy/History Loading (Full Message) ---
        function appendFullMessage(index, role, content, modelName) {
            createMessageBubble(index, role, modelName, content, true);
        }

        // --- Thinking Indicator Logic ---
        function showThinking() {
            removeThinking(); // Prevent duplicates
            const chatContainer = document.getElementById('chat-container');
            
            const thinkingDiv = document.createElement('div');
            thinkingDiv.id = 'thinking-indicator';
            thinkingDiv.classList.add('message', 'thinking');
            thinkingDiv.textContent = "Thinking...";
            
            chatContainer.appendChild(thinkingDiv);
            window.scrollTo(0, document.body.scrollHeight);
        }

        function removeThinking() {
            const thinkingDiv = document.getElementById('thinking-indicator');
            if (thinkingDiv) {
                thinkingDiv.remove();
            }
        }

        // --- Streaming Logic ---

        // 1. Called by Python when first token arrives (replaces Thinking)
        function start_message(index, role, modelName) {
            removeThinking();
            // Create an empty bubble
            createMessageBubble(index, role, modelName, "", false);
        }

        // 2. Called by Python via Signal for every token
        function appendToken(text) {
            if (currentContentDiv) {
                // We use createTextNode to safely escape HTML special chars during streaming
                currentContentDiv.appendChild(document.createTextNode(text));
                
                // Throttle scrolling to the refresh rate to avoid layout thrashing
                if (!isScrolling) {
                    isScrolling = true;
                    window.requestAnimationFrame(() => {
                        window.scrollTo(0, document.body.scrollHeight);
                        isScrolling = false;
                    });
                }
            }
        }

        // 3. Called by Python when stream ends (replaces raw text with Markdown HTML)
        function finalize_message(htmlContent) {
            if (currentContentDiv) {
                currentContentDiv.innerHTML = htmlContent;
                window.scrollTo(0, document.body.scrollHeight);
                currentContentDiv = null; // Reset
            }
        }

        // Helper to create the DOM structure
        function createMessageBubble(index, role, modelName, initialContent, isFinal) {
            const chatContainer = document.getElementById('chat-container');

            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', role);

            // Header
            const headerDiv = document.createElement('div');
            headerDiv.classList.add('message-header');

            const title = document.createElement('strong');
            title.textContent = (role === 'user') ? "You" : `Assistant (${modelName})`;
            headerDiv.appendChild(title);

            const copyBtn = document.createElement('button');
            copyBtn.textContent = "Copy";
            copyBtn.classList.add('copy-btn');
            copyBtn.onclick = function() {
                if (backendProxy) {
                    backendProxy.copy_message(index);
                }
            };
            headerDiv.appendChild(copyBtn);
            messageDiv.appendChild(headerDiv);

            // Content
            const contentDiv = document.createElement('div');
            contentDiv.classList.add('content-body');
            
            if (isFinal) {
                contentDiv.innerHTML = initialContent;
            } else {
                contentDiv.textContent = initialContent;
                currentContentDiv = contentDiv; // Set as active target for streaming
            }
            
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>

</body>
</html>

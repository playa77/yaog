<!-- chat_template.html for YaOG -->
<!-- Version: 3.5.3 (Phase 3: Model Management) -->
<!-- Description: Frontend view. Removed left border from bubbles. -->

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chat View</title>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 16px;
            margin: 0;
            padding: 15px;
        }

        #chat-container {
            display: flex;
            flex-direction: column;
            padding-bottom: 20px;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            max-width: 85%;
            line-height: 1.5;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .user {
            background-color: #e3f2fd; /* Light Blue */
            align-self: flex-end;
            color: #000000;
        }

        .assistant {
            background-color: #f5f5f5; /* Light Grey */
            align-self: flex-start;
            color: #000000;
        }

        /* Thinking Indicator Styling */
        .thinking {
            background-color: #f0f0f0;
            align-self: flex-start;
            color: #666;
            font-style: italic;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1.0; }
            100% { opacity: 0.6; }
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 5px;
        }

        .message-header strong {
            color: #333333;
        }

        .copy-btn {
            background-color: #ffffff;
            border: 1px solid #ccc;
            color: #555;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            padding: 2px 8px;
            min-width: 40px;
            text-align: center;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background-color: #eee;
            color: #000;
            border-color: #999;
        }
        
        .copy-btn.copied {
            background-color: #e8f5e9;
            border-color: #4caf50;
            color: #2e7d32;
        }

        .content-body {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .attachment-indicator {
            color: #555;
            font-family: sans-serif;
            font-size: 0.9em;
            margin-top: 10px;
            display: block;
            background-color: rgba(0,0,0,0.05);
            padding: 4px;
            border-radius: 4px;
            border: 1px dashed #aaa;
        }

        /* Markdown specific styling */
        .content-body code {
            background-color: #eee;
            color: #d63384;
            padding: 2px 4px;
            border-radius: 3px;
            font-family: monospace;
        }
        
        .content-body pre {
            background-color: #2d2d2d;
            color: #f8f8f2;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
        
        .content-body pre code {
            background-color: transparent;
            color: inherit;
            padding: 0;
        }
    </style>
</head>
<body>

    <div id="chat-container"></div>

    <script>
        let backendProxy = null;
        let currentContentDiv = null;
        let isScrolling = false;

        function clearChat() {
            const chatContainer = document.getElementById('chat-container');
            chatContainer.innerHTML = '';
            currentContentDiv = null;
        }

        function setFontSize(sizePx) {
            document.body.style.fontSize = sizePx;
        }

        document.addEventListener("DOMContentLoaded", function() {
            new QWebChannel(qt.webChannelTransport, function(channel) {
                backendProxy = channel.objects.backend;
                backendProxy.message_added.connect(appendFullMessage);
                backendProxy.token_received.connect(appendToken);
            });
        });

        function appendFullMessage(index, role, content, modelName) {
            createMessageBubble(index, role, modelName, content, true);
        }

        function showThinking() {
            removeThinking();
            const chatContainer = document.getElementById('chat-container');
            const thinkingDiv = document.createElement('div');
            thinkingDiv.id = 'thinking-indicator';
            thinkingDiv.classList.add('message', 'thinking');
            thinkingDiv.textContent = "Thinking...";
            chatContainer.appendChild(thinkingDiv);
            window.scrollTo(0, document.body.scrollHeight);
        }

        function removeThinking() {
            const thinkingDiv = document.getElementById('thinking-indicator');
            if (thinkingDiv) thinkingDiv.remove();
        }

        function start_message(index, role, modelName) {
            removeThinking();
            createMessageBubble(index, role, modelName, "", false);
        }

        function appendToken(text) {
            if (currentContentDiv) {
                currentContentDiv.appendChild(document.createTextNode(text));
                if (!isScrolling) {
                    isScrolling = true;
                    window.requestAnimationFrame(() => {
                        window.scrollTo(0, document.body.scrollHeight);
                        isScrolling = false;
                    });
                }
            }
        }

        function finalize_message(htmlContent) {
            if (currentContentDiv) {
                currentContentDiv.innerHTML = htmlContent;
                window.scrollTo(0, document.body.scrollHeight);
                currentContentDiv = null;
            }
        }

        function createMessageBubble(index, role, modelName, initialContent, isFinal) {
            const chatContainer = document.getElementById('chat-container');
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', role);

            const headerDiv = document.createElement('div');
            headerDiv.classList.add('message-header');

            const title = document.createElement('strong');
            title.textContent = (role === 'user') ? "You" : `Assistant (${modelName})`;
            headerDiv.appendChild(title);

            const copyBtn = document.createElement('button');
            copyBtn.textContent = "Copy";
            copyBtn.classList.add('copy-btn');
            
            copyBtn.onclick = function() {
                if (backendProxy) {
                    backendProxy.copy_message(index);
                    const originalText = "Copy";
                    copyBtn.textContent = "✓";
                    copyBtn.classList.add('copied');
                    setTimeout(() => {
                        copyBtn.textContent = originalText;
                        copyBtn.classList.remove('copied');
                    }, 2000);
                }
            };
            
            headerDiv.appendChild(copyBtn);
            messageDiv.appendChild(headerDiv);

            const contentDiv = document.createElement('div');
            contentDiv.classList.add('content-body');
            
            if (isFinal) {
                contentDiv.innerHTML = initialContent;
            } else {
                contentDiv.textContent = initialContent;
                currentContentDiv = contentDiv;
            }
            
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>
</body>
</html>

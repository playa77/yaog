<!-- chat_template.html for OR-Client (yaog.py) -->
<!-- Version: 2.2 -->
<!-- Description: The frontend view for the chat interface. -->
<!-- Change Log (v2.2): -->
<!-- - Added Copy buttons to message bubbles. -->
<!-- - Added JS logic to call backend.copy_message(index). -->

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chat View</title>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <style>
        body {
            background-color: #1e1e1e;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 16px;
            margin: 0;
            padding: 15px;
        }

        #chat-container {
            display: flex;
            flex-direction: column;
            padding-bottom: 20px;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            max-width: 85%;
            line-height: 1.5;
            position: relative; /* For absolute positioning of copy button if needed */
        }

        .user {
            background-color: #2d2d2d;
            border-left: 4px solid #4CAF50;
            align-self: flex-end;
        }

        .assistant {
            background-color: #383838;
            border-left: 4px solid #2196F3;
            align-self: flex-start;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }

        .message-header strong {
            color: #ffffff;
        }

        .copy-btn {
            background-color: transparent;
            border: 1px solid #666;
            color: #aaa;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            padding: 2px 8px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background-color: #555;
            color: white;
            border-color: #888;
        }

        /* 
           .content-body handles the actual text/html payload.
           white-space: pre-wrap ensures newlines from the user/LLM are respected.
        */
        .content-body {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        /* Styling for the attachment indicator generated by Python */
        .attachment-indicator {
            color: #888;
            font-family: sans-serif;
            font-size: 0.9em;
            margin-top: 10px;
            display: block;
            background-color: rgba(0,0,0,0.2);
            padding: 4px;
            border-radius: 4px;
        }

        /* Markdown specific styling */
        .content-body code {
            background-color: #1a1a1a;
            padding: 2px 4px;
            border-radius: 3px;
            font-family: monospace;
        }
        .content-body pre {
            background-color: #1a1a1a;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
        .content-body pre code {
            background-color: transparent;
            padding: 0;
        }
    </style>
</head>
<body>

    <div id="chat-container"></div>

    <script>
        let backendProxy = null;

        function clearChat() {
            const chatContainer = document.getElementById('chat-container');
            chatContainer.innerHTML = '';
        }

        document.addEventListener("DOMContentLoaded", function() {
            new QWebChannel(qt.webChannelTransport, function(channel) {
                backendProxy = channel.objects.backend;
                backendProxy.message_added.connect(appendMessage);
            });
        });

        // index: The index of the message in the Python list (for copying source)
        function appendMessage(index, role, content, modelName) {
            const chatContainer = document.getElementById('chat-container');

            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', role);

            // Header Row
            const headerDiv = document.createElement('div');
            headerDiv.classList.add('message-header');

            const title = document.createElement('strong');
            title.textContent = (role === 'user') ? "You" : `Assistant (${modelName})`;
            headerDiv.appendChild(title);

            // Copy Button
            const copyBtn = document.createElement('button');
            copyBtn.textContent = "Copy";
            copyBtn.classList.add('copy-btn');
            copyBtn.onclick = function() {
                if (backendProxy) {
                    backendProxy.copy_message(index);
                }
            };
            headerDiv.appendChild(copyBtn);

            messageDiv.appendChild(headerDiv);

            // Content Body
            const contentDiv = document.createElement('div');
            contentDiv.classList.add('content-body');
            
            // Use innerHTML to allow rendering of HTML (Markdown or Attachment spans)
            contentDiv.innerHTML = content; 
            
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>

</body>
</html>

<!-- chat_template.html for OR-Client (yaog.py) -->
<!-- Version: 2.1 -->
<!-- Description: The frontend view for the chat interface. -->
<!-- Change Log (v2.1): -->
<!-- - Switched rendering from textContent to innerHTML to support -->
<!--   HTML-based attachment indicators. -->
<!-- - Added .content-body class to preserve whitespace. -->

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chat View</title>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <style>
        body {
            background-color: #1e1e1e;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 16px;
            margin: 0;
            padding: 15px;
        }

        #chat-container {
            display: flex;
            flex-direction: column;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            max-width: 85%;
            line-height: 1.5;
        }

        .user {
            background-color: #2d2d2d;
            border-left: 4px solid #4CAF50;
            align-self: flex-end;
        }

        .assistant {
            background-color: #383838;
            border-left: 4px solid #2196F3;
            align-self: flex-start;
        }

        .message strong {
            color: #ffffff;
            display: block;
            margin-bottom: 8px;
        }

        /* 
           .content-body handles the actual text/html payload.
           white-space: pre-wrap ensures newlines from the user/LLM are respected.
        */
        .content-body {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        /* Styling for the attachment indicator generated by Python */
        .attachment-indicator {
            color: #888;
            font-family: sans-serif;
            font-size: 0.9em;
            margin-top: 10px;
            display: block;
        }
    </style>
</head>
<body>

    <div id="chat-container"></div>

    <script>
        function clearChat() {
            const chatContainer = document.getElementById('chat-container');
            chatContainer.innerHTML = '';
        }

        document.addEventListener("DOMContentLoaded", function() {
            new QWebChannel(qt.webChannelTransport, function(channel) {
                const backend = channel.objects.backend;
                backend.message_added.connect(appendMessage);
            });

            function appendMessage(role, content, modelName) {
                const chatContainer = document.getElementById('chat-container');

                const messageDiv = document.createElement('div');
                messageDiv.classList.add('message', role);

                const header = document.createElement('strong');
                header.textContent = (role === 'user') ? "You" : `Assistant (${modelName})`;
                messageDiv.appendChild(header);

                // Create a container for the content
                const contentDiv = document.createElement('div');
                contentDiv.classList.add('content-body');
                
                // CRITICAL CHANGE: Use innerHTML to allow rendering of the attachment <span> tags.
                // The Python backend MUST escape user text to prevent XSS.
                contentDiv.innerHTML = content; 
                
                messageDiv.appendChild(contentDiv);
                chatContainer.appendChild(messageDiv);
                window.scrollTo(0, document.body.scrollHeight);
            }
        });
    </script>

</body>
</html>

<!-- chat_template.html for YaOG -->
<!-- Version: 4.1.7 (Regenerate Fix) -->
<!-- Description: Ensures Regenerate button appears on the latest answer after streaming finishes. -->

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chat View</title>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 16px;
            margin: 0;
            padding: 15px;
        }

        #chat-container {
            display: flex;
            flex-direction: column;
            padding-bottom: 20px;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            max-width: 85%;
            line-height: 1.5;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .user {
            background-color: #e3f2fd;
            align-self: flex-end;
            color: #000000;
        }

        .assistant {
            background-color: #f5f5f5;
            align-self: flex-start;
            color: #000000;
        }

        .thinking {
            background-color: #f0f0f0;
            align-self: flex-start;
            color: #666;
            font-style: italic;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1.0; }
            100% { opacity: 0.6; }
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 5px;
        }

        .message-header strong {
            color: #333333;
        }

        .btn-group {
            display: flex;
            gap: 5px;
        }

        .action-btn {
            background-color: #ffffff;
            border: 1px solid #ccc;
            color: #555;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            padding: 2px 8px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background-color: #eee;
            color: #000;
            border-color: #999;
        }

        .copied {
            background-color: #e8f5e9 !important;
            color: #2e7d32 !important;
            border-color: #2e7d32 !important;
        }

        .danger-btn:hover {
            background-color: #ffebee;
            color: #d32f2f;
            border-color: #d32f2f;
        }

        .content-body {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Edit Mode Styles */
        .edit-area {
            width: 100%;
            min-height: 100px;
            font-family: inherit;
            font-size: inherit;
            padding: 5px;
            margin-bottom: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
        }

        .edit-controls {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .save-btn { background-color: #4caf50; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .cancel-btn { background-color: #f44336; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }

        .attachment-indicator {
            color: #555;
            font-family: sans-serif;
            font-size: 0.9em;
            margin-top: 10px;
            display: block;
            background-color: rgba(0,0,0,0.05);
            padding: 4px;
            border-radius: 4px;
            border: 1px dashed #aaa;
        }

        .content-body code {
            background-color: #eee;
            color: #d63384;
            padding: 2px 4px;
            border-radius: 3px;
            font-family: monospace;
        }
        
        .content-body pre {
            background-color: #2d2d2d;
            color: #f8f8f2;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>

    <div id="chat-container"></div>

    <script>
        let backendProxy = null;
        let currentContentDiv = null;
        let isScrolling = false;

        function clearChat() {
            document.getElementById('chat-container').innerHTML = '';
            currentContentDiv = null;
        }

        function setFontSize(sizePx) {
            document.body.style.fontSize = sizePx;
        }

        document.addEventListener("DOMContentLoaded", function() {
            new QWebChannel(qt.webChannelTransport, function(channel) {
                backendProxy = channel.objects.backend;
                backendProxy.message_added.connect(appendFullMessage);
                backendProxy.token_received.connect(appendToken);
            });
        });

        function appendFullMessage(index, role, content, modelName) {
            createMessageBubble(index, role, modelName, content, true);
        }

        function showThinking() {
            removeThinking();
            const chatContainer = document.getElementById('chat-container');
            const thinkingDiv = document.createElement('div');
            thinkingDiv.id = 'thinking-indicator';
            thinkingDiv.classList.add('message', 'thinking');
            thinkingDiv.textContent = "Thinking...";
            chatContainer.appendChild(thinkingDiv);
            window.scrollTo(0, document.body.scrollHeight);
        }

        function removeThinking() {
            const thinkingDiv = document.getElementById('thinking-indicator');
            if (thinkingDiv) thinkingDiv.remove();
        }

        function start_message(index, role, modelName) {
            removeThinking();
            createMessageBubble(index, role, modelName, "", false);
        }

        function appendToken(text) {
            if (currentContentDiv) {
                currentContentDiv.appendChild(document.createTextNode(text));
                if (!isScrolling) {
                    isScrolling = true;
                    window.requestAnimationFrame(() => {
                        window.scrollTo(0, document.body.scrollHeight);
                        isScrolling = false;
                    });
                }
            }
        }

        function finalize_message(htmlContent) {
            if (currentContentDiv) {
                currentContentDiv.innerHTML = htmlContent;
                
                // Inject Regenerate button for the just-finished Assistant message
                const messageDiv = currentContentDiv.closest('.message');
                if (messageDiv && messageDiv.classList.contains('assistant')) {
                    const btnGroup = messageDiv.querySelector('.btn-group');
                    if (btnGroup) {
                        // Extract index from ID "msg-123"
                        const idParts = messageDiv.id.split('-');
                        const index = parseInt(idParts[1]);

                        const regenBtn = document.createElement('button');
                        regenBtn.textContent = "Regenerate";
                        regenBtn.classList.add('action-btn');
                        regenBtn.onclick = function() { 
                            if(confirm("Regenerate this response? (Deletes subsequent messages)")) {
                                if (backendProxy) backendProxy.request_regenerate(index);
                            }
                        };

                        // Insert before the Delete button (which is usually the last child)
                        if (btnGroup.lastChild) {
                            btnGroup.insertBefore(regenBtn, btnGroup.lastChild);
                        } else {
                            btnGroup.appendChild(regenBtn);
                        }
                    }
                }

                window.scrollTo(0, document.body.scrollHeight);
                currentContentDiv = null;
            }
        }

        function createMessageBubble(index, role, modelName, initialContent, isFinal) {
            const chatContainer = document.getElementById('chat-container');
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', role);
            messageDiv.id = `msg-${index}`;

            const headerDiv = document.createElement('div');
            headerDiv.classList.add('message-header');

            const title = document.createElement('strong');
            title.textContent = (role === 'user') ? "You" : `Assistant (${modelName})`;
            headerDiv.appendChild(title);

            const btnGroup = document.createElement('div');
            btnGroup.classList.add('btn-group');

            // Copy Button
            const copyBtn = document.createElement('button');
            copyBtn.textContent = "Copy";
            copyBtn.classList.add('action-btn');
            copyBtn.onclick = function() {
                if (backendProxy) backendProxy.copy_message(index);
                
                // Visual Feedback
                const originalText = copyBtn.textContent;
                copyBtn.textContent = "✓";
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                    copyBtn.classList.remove('copied');
                }, 2000);
            };
            btnGroup.appendChild(copyBtn);

            // Edit Button (User only)
            if (role === 'user' && isFinal) {
                const editBtn = document.createElement('button');
                editBtn.textContent = "Edit";
                editBtn.classList.add('action-btn');
                editBtn.onclick = function() { enableEditing(index); };
                btnGroup.appendChild(editBtn);
            }

            // Regenerate Button (Assistant only)
            // Note: This handles history loading. The live streaming case is handled in finalize_message.
            if (role === 'assistant' && isFinal) {
                const regenBtn = document.createElement('button');
                regenBtn.textContent = "Regenerate";
                regenBtn.classList.add('action-btn');
                regenBtn.onclick = function() { 
                    if(confirm("Regenerate this response? (Deletes subsequent messages)")) {
                        if (backendProxy) backendProxy.request_regenerate(index);
                    }
                };
                btnGroup.appendChild(regenBtn);
            }

            // Delete Button (All messages)
            const delBtn = document.createElement('button');
            delBtn.textContent = "Delete";
            delBtn.classList.add('action-btn', 'danger-btn');
            delBtn.onclick = function() {
                if(confirm("Delete this message and everything after it?")) {
                    if (backendProxy) backendProxy.request_delete(index);
                }
            };
            btnGroup.appendChild(delBtn);

            headerDiv.appendChild(btnGroup);
            messageDiv.appendChild(headerDiv);

            const contentDiv = document.createElement('div');
            contentDiv.classList.add('content-body');
            contentDiv.id = `content-${index}`;
            
            if (isFinal) {
                contentDiv.innerHTML = initialContent;
            } else {
                contentDiv.textContent = initialContent;
                currentContentDiv = contentDiv;
            }
            
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            window.scrollTo(0, document.body.scrollHeight);
        }

        function enableEditing(index) {
            const contentDiv = document.getElementById(`content-${index}`);
            if (!contentDiv) return;

            const currentHTML = contentDiv.innerHTML;
            const currentText = contentDiv.innerText;

            contentDiv.innerHTML = '';
            
            const textArea = document.createElement('textarea');
            textArea.classList.add('edit-area');
            textArea.value = currentText;
            
            const controlsDiv = document.createElement('div');
            controlsDiv.classList.add('edit-controls');
            
            const saveBtn = document.createElement('button');
            saveBtn.textContent = "Save & Branch";
            saveBtn.classList.add('save-btn');
            saveBtn.onclick = function() {
                const newText = textArea.value;
                if (backendProxy) backendProxy.request_edit(index, newText);
            };

            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = "Cancel";
            cancelBtn.classList.add('cancel-btn');
            cancelBtn.onclick = function() {
                contentDiv.innerHTML = currentHTML;
            };

            controlsDiv.appendChild(cancelBtn);
            controlsDiv.appendChild(saveBtn);
            
            contentDiv.appendChild(textArea);
            contentDiv.appendChild(controlsDiv);
        }
    </script>
</body>
</html>

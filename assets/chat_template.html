<!-- chat_template.html for YaOG -->
<!-- Version: 5.2.1 (Refined Slate - Darker Chat) -->
<!-- Description: Matches the #E5E7EB Cool Gray theme of the main app. -->

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chat View</title>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <style>
        :root {
            --main-font: "Segoe UI", "Inter", Roboto, sans-serif;
            --bg-color: #E5E7EB; /* Slightly darker Cool Gray Background */
            --text-color: #1F2937; /* Charcoal */
            --user-bg: #DBEAFE; /* Soft Blue-200 */
            --user-text: #1E3A8A; /* Dark Blue Text */
            --assistant-bg: #FFFFFF; /* Pure White Card */
            --assistant-border: #D1D5DB; /* Slightly darker border for contrast */
            --code-bg: #111827; /* Dark Slate for Code */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--main-font);
            font-size: 15px;
            margin: 0;
            padding: 20px;
            overflow-y: auto;
        }

        #chat-container {
            display: flex;
            flex-direction: column;
            padding-bottom: 40px;
            max-width: 900px;
            margin: 0 auto;
        }

        .message {
            padding: 16px 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            line-height: 1.6;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); /* Subtle depth */
        }

        .user {
            background-color: var(--user-bg);
            color: var(--user-text);
            align-self: flex-end;
            max-width: 85%;
            border-bottom-right-radius: 2px;
            border: 1px solid #BFDBFE;
        }

        .assistant {
            background-color: var(--assistant-bg);
            align-self: flex-start;
            color: var(--text-color);
            max-width: 95%;
            width: 100%;
            border-bottom-left-radius: 2px;
            border: 1px solid var(--assistant-border);
        }

        .thinking {
            background-color: transparent;
            align-self: flex-start;
            color: #6B7280;
            font-style: italic;
            border: 1px dashed #D1D5DB;
            box-shadow: none;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1.0; }
            100% { opacity: 0.6; }
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            font-size: 0.85em;
            color: #6B7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
        }

        .user .message-header {
            color: #1E40AF;
            border-bottom-color: rgba(30, 58, 138, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 8px;
            opacity: 0.0; /* Hidden until hover for cleaner look */
            transition: opacity 0.2s;
        }

        .message:hover .btn-group {
            opacity: 1.0;
        }

        .action-btn {
            background-color: #FFFFFF;
            border: 1px solid #D1D5DB;
            color: #4B5563;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            padding: 2px 8px;
            font-family: var(--main-font);
            transition: all 0.1s;
        }

        .action-btn:hover {
            background-color: #F3F4F6;
            color: #111827;
            border-color: #9CA3AF;
        }

        .danger-btn:hover {
            background-color: #FEF2F2;
            color: #DC2626;
            border-color: #FCA5A5;
        }

        .content-body {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Edit Mode */
        .edit-area {
            width: 100%;
            min-height: 100px;
            font-family: inherit;
            font-size: inherit;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #2563EB;
            border-radius: 6px;
            resize: vertical;
            outline: none;
        }

        .edit-controls {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .save-btn { background-color: #2563EB; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .cancel-btn { background-color: #EF4444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }

        .attachment-indicator {
            color: #4B5563;
            font-size: 0.85em;
            margin-top: 12px;
            display: inline-block;
            background-color: #F3F4F6;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #E5E7EB;
            margin-right: 5px;
            font-weight: 600;
        }

        /* Markdown Elements */
        .content-body code {
            background-color: #F3F4F6;
            color: #DC2626;
            padding: 2px 5px;
            border-radius: 4px;
            font-family: "Consolas", "Monaco", monospace;
            font-size: 0.9em;
            border: 1px solid #E5E7EB;
        }
        
        .content-body pre {
            background-color: var(--code-bg);
            color: #E5E7EB;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 15px 0;
            border: 1px solid #374151;
        }

        .content-body pre code {
            background-color: transparent;
            color: inherit;
            padding: 0;
            border: none;
            font-size: 0.9em;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin: 15px 0;
            font-size: 0.95em;
        }
        
        th, td {
            border: 1px solid #E5E7EB;
            padding: 10px;
            text-align: left;
        }
        
        th {
            background-color: #F9FAFB;
            font-weight: 700;
            color: #374151;
        }
    </style>
</head>
<body>

    <div id="chat-container"></div>

    <script>
        let backendProxy = null;
        let currentContentDiv = null;
        let isScrolling = false;

        function clearChat() {
            document.getElementById('chat-container').innerHTML = '';
            currentContentDiv = null;
        }

        function setFontSize(sizePx) {
            document.body.style.fontSize = sizePx;
        }

        document.addEventListener("DOMContentLoaded", function() {
            new QWebChannel(qt.webChannelTransport, function(channel) {
                backendProxy = channel.objects.backend;
                backendProxy.message_added.connect(appendFullMessage);
                backendProxy.token_received.connect(appendToken);
            });
        });

        function appendFullMessage(index, role, content, modelName) {
            createMessageBubble(index, role, modelName, content, true);
        }

        function showThinking() {
            removeThinking();
            const chatContainer = document.getElementById('chat-container');
            const thinkingDiv = document.createElement('div');
            thinkingDiv.id = 'thinking-indicator';
            thinkingDiv.classList.add('message', 'thinking');
            thinkingDiv.textContent = "Thinking...";
            chatContainer.appendChild(thinkingDiv);
            window.scrollTo(0, document.body.scrollHeight);
        }

        function removeThinking() {
            const thinkingDiv = document.getElementById('thinking-indicator');
            if (thinkingDiv) thinkingDiv.remove();
        }

        function start_message(index, role, modelName) {
            removeThinking();
            createMessageBubble(index, role, modelName, "", false);
        }

        function appendToken(text) {
            if (currentContentDiv) {
                currentContentDiv.appendChild(document.createTextNode(text));
                if (!isScrolling) {
                    isScrolling = true;
                    window.requestAnimationFrame(() => {
                        window.scrollTo(0, document.body.scrollHeight);
                        isScrolling = false;
                    });
                }
            }
        }

        function finalize_message(htmlContent) {
            if (currentContentDiv) {
                currentContentDiv.innerHTML = htmlContent;
                
                const messageDiv = currentContentDiv.closest('.message');
                if (messageDiv && messageDiv.classList.contains('assistant')) {
                    const btnGroup = messageDiv.querySelector('.btn-group');
                    if (btnGroup) {
                        const idParts = messageDiv.id.split('-');
                        const index = parseInt(idParts[1]);

                        const regenBtn = document.createElement('button');
                        regenBtn.textContent = "Regenerate";
                        regenBtn.classList.add('action-btn');
                        regenBtn.onclick = function() { 
                            if(confirm("Regenerate this response? (Deletes subsequent messages)")) {
                                if (backendProxy) backendProxy.request_regenerate(index);
                            }
                        };

                        if (btnGroup.lastChild) {
                            btnGroup.insertBefore(regenBtn, btnGroup.lastChild);
                        } else {
                            btnGroup.appendChild(regenBtn);
                        }
                    }
                }

                window.scrollTo(0, document.body.scrollHeight);
                currentContentDiv = null;
            }
        }

        function createMessageBubble(index, role, modelName, initialContent, isFinal) {
            const chatContainer = document.getElementById('chat-container');
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', role);
            messageDiv.id = `msg-${index}`;

            const headerDiv = document.createElement('div');
            headerDiv.classList.add('message-header');

            const title = document.createElement('strong');
            title.textContent = (role === 'user') ? "You" : `Assistant (${modelName})`;
            headerDiv.appendChild(title);

            const btnGroup = document.createElement('div');
            btnGroup.classList.add('btn-group');

            const copyBtn = document.createElement('button');
            copyBtn.textContent = "Copy";
            copyBtn.classList.add('action-btn');
            copyBtn.onclick = function() {
                if (backendProxy) backendProxy.copy_message(index);
                const originalText = copyBtn.textContent;
                copyBtn.textContent = "✓";
                setTimeout(() => { copyBtn.textContent = originalText; }, 2000);
            };
            btnGroup.appendChild(copyBtn);

            if (role === 'user' && isFinal) {
                const editBtn = document.createElement('button');
                editBtn.textContent = "Edit";
                editBtn.classList.add('action-btn');
                editBtn.onclick = function() { enableEditing(index); };
                btnGroup.appendChild(editBtn);
            }

            if (role === 'assistant' && isFinal) {
                const regenBtn = document.createElement('button');
                regenBtn.textContent = "Regenerate";
                regenBtn.classList.add('action-btn');
                regenBtn.onclick = function() { 
                    if(confirm("Regenerate this response? (Deletes subsequent messages)")) {
                        if (backendProxy) backendProxy.request_regenerate(index);
                    }
                };
                btnGroup.appendChild(regenBtn);
            }

            const delBtn = document.createElement('button');
            delBtn.textContent = "Delete";
            delBtn.classList.add('action-btn', 'danger-btn');
            delBtn.onclick = function() {
                if(confirm("Delete this message and everything after it?")) {
                    if (backendProxy) backendProxy.request_delete(index);
                }
            };
            btnGroup.appendChild(delBtn);

            headerDiv.appendChild(btnGroup);
            messageDiv.appendChild(headerDiv);

            const contentDiv = document.createElement('div');
            contentDiv.classList.add('content-body');
            contentDiv.id = `content-${index}`;
            
            if (isFinal) {
                contentDiv.innerHTML = initialContent;
            } else {
                contentDiv.textContent = initialContent;
                currentContentDiv = contentDiv;
            }
            
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            window.scrollTo(0, document.body.scrollHeight);
        }

        function enableEditing(index) {
            const contentDiv = document.getElementById(`content-${index}`);
            if (!contentDiv) return;

            const currentHTML = contentDiv.innerHTML;
            const currentText = contentDiv.innerText;

            contentDiv.innerHTML = '';
            
            const textArea = document.createElement('textarea');
            textArea.classList.add('edit-area');
            textArea.value = currentText;
            
            const controlsDiv = document.createElement('div');
            controlsDiv.classList.add('edit-controls');
            
            const saveBtn = document.createElement('button');
            saveBtn.textContent = "Save & Branch";
            saveBtn.classList.add('save-btn');
            saveBtn.onclick = function() {
                const newText = textArea.value;
                if (backendProxy) backendProxy.request_edit(index, newText);
            };

            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = "Cancel";
            cancelBtn.classList.add('cancel-btn');
            cancelBtn.onclick = function() {
                contentDiv.innerHTML = currentHTML;
            };

            controlsDiv.appendChild(cancelBtn);
            controlsDiv.appendChild(saveBtn);
            
            contentDiv.appendChild(textArea);
            contentDiv.appendChild(controlsDiv);
        }
    </script>
</body>
</html>
